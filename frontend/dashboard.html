<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momentum — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">

  <header class="topbar" id="topbar"></header>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <div class="breadcrumb">MOMENTUM / <a href="dashboard.html">DASHBOARD</a></div>
      <h1>Overview</h1>
      <p>Summary of the most recent pipeline run — <span id="run-file" class="text-mono" style="font-size:12px"></span></p>
    </div>

    <!-- Stat cards -->
    <div class="stat-grid" id="stat-grid"></div>

    <div class="two-col">

      <!-- Anomaly breakdown bar chart -->
      <div class="panel">
        <div class="panel-header">Anomalies by Type</div>
        <div class="panel-body">
          <div class="bar-chart" id="type-chart"></div>
        </div>
      </div>

      <!-- Risk distribution + timeline -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="panel">
          <div class="panel-header">Risk Distribution</div>
          <div class="panel-body">
            <div class="bar-chart" id="risk-chart"></div>
            <hr class="divider">
            <div class="flex gap16 mt8">
              <div style="flex:1;text-align:center">
                <div class="text-faint text-sm mb8">High</div>
                <div id="pct-high" class="text-mono" style="font-size:22px;color:#ff6b6b"></div>
              </div>
              <div style="flex:1;text-align:center">
                <div class="text-faint text-sm mb8">Medium</div>
                <div id="pct-med" class="text-mono" style="font-size:22px;color:#e0ac44"></div>
              </div>
              <div style="flex:1;text-align:center">
                <div class="text-faint text-sm mb8">Low</div>
                <div id="pct-low" class="text-mono" style="font-size:22px;color:#52c491"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">Model Info</div>
          <div class="panel-body">
            <div class="detail-grid">
              <div class="detail-item"><div class="dl">Algorithm</div><div class="dv mono" id="m-algo"></div></div>
              <div class="detail-item"><div class="dl">Contamination</div><div class="dv mono" id="m-cont"></div></div>
              <div class="detail-item"><div class="dl">Records Processed</div><div class="dv mono" id="m-total"></div></div>
              <div class="detail-item"><div class="dl">Processing Time</div><div class="dv mono" id="m-time"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Top flagged table -->
    <div class="panel mt16">
      <div class="panel-header">
        Top 5 Highest-Risk Transactions
        <a href="flagged.html" class="btn btn-ghost btn-sm">View all →</a>
      </div>
      <div id="top-table"></div>
    </div>

  </main>
</div>

<script src="data.js"></script>
<script>
  document.getElementById('topbar').innerHTML = Utils.topbar('ready');
  document.getElementById('sidebar').innerHTML = Utils.sidebar('dashboard');

  const R = RUN_SUMMARY;

  document.getElementById('run-file').textContent = R.file;

  /* Stat cards */
  const stats = [
    { label:'Total Transactions', value: R.total.toLocaleString(), sub:'in uploaded file' },
    { label:'Flagged',            value: R.flagged,                sub:'anomalies detected', highlight: true },
    { label:'High Risk',          value: R.highRisk,               sub:'require immediate review' },
    { label:'Medium Risk',        value: R.mediumRisk,             sub:'warrant investigation' },
    { label:'Low Risk',           value: R.lowRisk,                sub:'monitor only' },
    { label:'Flagged Rate',       value: Utils.fmt.pct(R.flagged / R.total), sub:'of total transactions' },
  ];
  document.getElementById('stat-grid').innerHTML = stats.map(s => `
    <div class="stat-card ${s.highlight ? 'highlight' : ''}">
      <div class="label">${s.label}</div>
      <div class="value">${s.value}</div>
      <div class="sub">${s.sub}</div>
    </div>
  `).join('');

  /* Anomaly type chart */
  const maxType = Math.max(...ANOMALY_TYPES.map(a => a.count));
  document.getElementById('type-chart').innerHTML = ANOMALY_TYPES
    .sort((a,b) => b.count - a.count)
    .map(a => {
      const pct = (a.count / maxType * 100).toFixed(0);
      const cls = a.risk === 'high' ? '' : a.risk === 'medium' ? 'yellow' : 'green';
      return `
        <div class="bar-row">
          <div class="bar-label" title="${a.name}">${a.name}</div>
          <div class="bar-track">
            <div class="bar-fill ${cls}" style="width:${pct}%"></div>
          </div>
          <div class="bar-count">${a.count}</div>
        </div>
      `;
    }).join('');

  /* Risk chart */
  document.getElementById('risk-chart').innerHTML = `
    <div class="bar-row">
      <div class="bar-label">High</div>
      <div class="bar-track"><div class="bar-fill" style="width:${R.highRisk/R.flagged*100}%;background:#ff6b6b"></div></div>
      <div class="bar-count">${R.highRisk}</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">Medium</div>
      <div class="bar-track"><div class="bar-fill yellow" style="width:${R.mediumRisk/R.flagged*100}%"></div></div>
      <div class="bar-count">${R.mediumRisk}</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">Low</div>
      <div class="bar-track"><div class="bar-fill green" style="width:${R.lowRisk/R.flagged*100}%"></div></div>
      <div class="bar-count">${R.lowRisk}</div>
    </div>
  `;

  document.getElementById('pct-high').textContent = Utils.fmt.pct(R.highRisk / R.flagged);
  document.getElementById('pct-med').textContent  = Utils.fmt.pct(R.mediumRisk / R.flagged);
  document.getElementById('pct-low').textContent  = Utils.fmt.pct(R.lowRisk / R.flagged);

  /* Model info */
  document.getElementById('m-algo').textContent  = R.model;
  document.getElementById('m-cont').textContent  = (R.contamination * 100) + '%';
  document.getElementById('m-total').textContent = R.total.toLocaleString();
  document.getElementById('m-time').textContent  = (R.processingMs / 1000).toFixed(2) + 's';

  /* Top 5 table */
  const top5 = MOCK_TRANSACTIONS.filter(t => t.flag === 1).slice(0, 5);
  document.getElementById('top-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Transaction ID</th><th>Account</th><th>Date</th>
        <th>Type</th><th>Amount</th><th>Risk Score</th><th>Anomaly</th>
      </tr></thead>
      <tbody>
        ${top5.map(t => `
          <tr onclick="window.location='flagged.html'">
            <td class="mono">${t.id}</td>
            <td class="mono">${t.account}</td>
            <td class="dim">${t.date}</td>
            <td>${t.type}</td>
            <td class="mono">${Utils.fmt.currency(t.amount)}</td>
            <td>
              <div class="score-bar-wrap">
                <div class="score-bar"><div class="score-bar-fill" style="width:${t.score}%;background:${Utils.scoreColor(t.score)}"></div></div>
                <div class="score-val">${t.score}</div>
              </div>
            </td>
            <td><span class="risk ${t.risk}">${t.risk.toUpperCase()}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
</script>
</body>
</html>
