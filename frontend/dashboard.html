<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momentum — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">

  <header class="topbar" id="topbar"></header>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="page-header">
      <div class="breadcrumb">MOMENTUM / <a href="dashboard.html">DASHBOARD</a></div>
      <h1>Overview</h1>
      <p>Summary of the most recent pipeline run — <span id="run-file" class="text-mono" style="font-size:12px"></span></p>
    </div>

    <div class="stat-grid" id="stat-grid"></div>

    <div class="two-col">

      <div class="panel">
        <div class="panel-header">Anomalies by Type</div>
        <div class="panel-body">
          <div class="bar-chart" id="type-chart"></div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="panel">
          <div class="panel-header">Risk Distribution</div>
          <div class="panel-body">
            <div class="bar-chart" id="risk-chart"></div>
            <hr class="divider">
            <div class="flex gap16 mt8">
              <div style="flex:1;text-align:center">
                <div class="text-faint text-sm mb8">High</div>
                <div id="pct-high" class="text-mono" style="font-size:22px;color:#ff6b6b"></div>
              </div>
              <div style="flex:1;text-align:center">
                <div class="text-faint text-sm mb8">Medium</div>
                <div id="pct-med" class="text-mono" style="font-size:22px;color:#e0ac44"></div>
              </div>
              <div style="flex:1;text-align:center">
                <div class="text-faint text-sm mb8">Low</div>
                <div id="pct-low" class="text-mono" style="font-size:22px;color:#52c491"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">Model Info</div>
          <div class="panel-body">
            <div class="detail-grid">
              <div class="detail-item"><div class="dl">Algorithm</div><div class="dv mono" id="m-algo"></div></div>
              <div class="detail-item"><div class="dl">Contamination</div><div class="dv mono" id="m-cont"></div></div>
              <div class="detail-item"><div class="dl">Records Processed</div><div class="dv mono" id="m-total"></div></div>
              <div class="detail-item"><div class="dl">Processing Time</div><div class="dv mono" id="m-time"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel mt16">
      <div class="panel-header">
        Top 5 Highest-Risk Transactions
        <a href="flagged.html" class="btn btn-ghost btn-sm">View all &#8594;</a>
      </div>
      <div id="top-table"></div>
    </div>

  </main>
</div>

<script src="data.js"></script>
<script>
  document.getElementById('topbar').innerHTML = Utils.topbar('ready');
  document.getElementById('sidebar').innerHTML = Utils.sidebar('dashboard');

  /* Load live summary if available, else fall back to static mock */
  let R = RUN_SUMMARY;
  try {
    const stored = localStorage.getItem('run_summary');
    if (stored) R = JSON.parse(stored);
  } catch (_) {}

  document.getElementById('run-file').textContent = R.file;

  /* Stat cards */
  const total   = R.total   || 1;
  const flagged = R.flagged || 0;
  const stats = [
    { label:'Total Transactions', value: total.toLocaleString(),                sub:'in uploaded file' },
    { label:'Flagged',            value: flagged,                               sub:'anomalies detected', highlight: true },
    { label:'High Risk',          value: R.highRisk   ?? 0,                    sub:'require immediate review' },
    { label:'Medium Risk',        value: R.mediumRisk ?? 0,                    sub:'warrant investigation' },
    { label:'Low Risk',           value: R.lowRisk    ?? 0,                    sub:'monitor only' },
    { label:'Flagged Rate',       value: Utils.fmt.pct(flagged / total),       sub:'of total transactions' },
  ];
  document.getElementById('stat-grid').innerHTML = stats.map(s => `
    <div class="stat-card ${s.highlight ? 'highlight' : ''}">
      <div class="label">${s.label}</div>
      <div class="value">${s.value}</div>
      <div class="sub">${s.sub}</div>
    </div>
  `).join('');

  /* Build anomaly type summary from live transactions */
  const DATA = getTransactions();
  const flaggedTxns = DATA.filter(t => t.flag === 1);

  /* Derive live anomaly type counts from real data if available */
  const liveTypeCounts = {};
  flaggedTxns.forEach(t => {
    if (!t.anomaly) return;
    t.anomaly.split(',').forEach(a => {
      const k = a.trim();
      if (!k) return;
      if (!liveTypeCounts[k]) liveTypeCounts[k] = { name:k, count:0, risk:'medium' };
      liveTypeCounts[k].count++;
      if (t.risk === 'high')   liveTypeCounts[k].risk = 'high';
    });
  });

  const typeData = Object.keys(liveTypeCounts).length
    ? Object.values(liveTypeCounts)
    : ANOMALY_TYPES;

  const maxType = Math.max(...typeData.map(a => a.count), 1);
  document.getElementById('type-chart').innerHTML = [...typeData]
    .sort((a, b) => b.count - a.count)
    .map(a => {
      const pct = (a.count / maxType * 100).toFixed(0);
      const cls = a.risk === 'high' ? '' : a.risk === 'medium' ? 'yellow' : 'green';
      return `
        <div class="bar-row">
          <div class="bar-label" title="${a.name}">${a.name}</div>
          <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
          <div class="bar-count">${a.count}</div>
        </div>`;
    }).join('');

  /* Risk distribution */
  const high   = R.highRisk   ?? flaggedTxns.filter(t => t.risk === 'high').length;
  const medium = R.mediumRisk ?? flaggedTxns.filter(t => t.risk === 'medium').length;
  const low    = R.lowRisk    ?? flaggedTxns.filter(t => t.risk === 'low').length;
  const total2 = Math.max(high + medium + low, 1);

  document.getElementById('risk-chart').innerHTML = `
    <div class="bar-row">
      <div class="bar-label">High</div>
      <div class="bar-track"><div class="bar-fill" style="width:${high/total2*100}%;background:#ff6b6b"></div></div>
      <div class="bar-count">${high}</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">Medium</div>
      <div class="bar-track"><div class="bar-fill yellow" style="width:${medium/total2*100}%"></div></div>
      <div class="bar-count">${medium}</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">Low</div>
      <div class="bar-track"><div class="bar-fill green" style="width:${low/total2*100}%"></div></div>
      <div class="bar-count">${low}</div>
    </div>
  `;

  document.getElementById('pct-high').textContent = Utils.fmt.pct(high / total2);
  document.getElementById('pct-med').textContent  = Utils.fmt.pct(medium / total2);
  document.getElementById('pct-low').textContent  = Utils.fmt.pct(low / total2);

  /* Model info */
  document.getElementById('m-algo').textContent  = R.model ?? 'IsolationForest';
  document.getElementById('m-cont').textContent  = ((R.contamination ?? 0.05) * 100) + '%';
  document.getElementById('m-total').textContent = (R.total ?? DATA.length).toLocaleString();
  document.getElementById('m-time').textContent  = ((R.processingMs ?? 0) / 1000).toFixed(2) + 's';

  /* Top 5 table — uses live data */
  const top5 = [...flaggedTxns].sort((a, b) => b.score - a.score).slice(0, 5);
  document.getElementById('top-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Transaction ID</th><th>Account</th><th>Date</th>
        <th>Type</th><th>Amount</th><th>Risk Score</th><th>Risk</th>
      </tr></thead>
      <tbody>
        ${top5.map(t => `
          <tr onclick="window.location='flagged.html'" style="cursor:pointer">
            <td class="mono">${t.id}</td>
            <td class="mono">${t.account}</td>
            <td class="dim">${t.date}</td>
            <td>${t.type}</td>
            <td class="mono">${Utils.fmt.currency(t.amount)}</td>
            <td>
              <div class="score-bar-wrap">
                <div class="score-bar"><div class="score-bar-fill" style="width:${t.score}%;background:${Utils.scoreColor(t.score)}"></div></div>
                <div class="score-val">${t.score}</div>
              </div>
            </td>
            <td><span class="risk ${t.risk}">${t.risk.toUpperCase()}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
</script>
</body>
</html>
